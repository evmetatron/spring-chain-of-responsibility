[changelog]
header = ""

body = """
    {% if version %}
        ## [{{ version | replace(from="v", to="") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
    {% else %}
        ## [unreleased]
    {% endif %}
    {% for group, commits in commits | group_by(attribute="group") %}
        ### {{ group }}

        {% for commit in commits %}
            - {{ commit.message | upper_first }}
        {% endfor %}
    {% endfor %}
"""

trim = true
footer = "<!-- generated by git-cliff -->\n"

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
tag_pattern = "[0-9]*"
skip_merge_commits = true

[[git.commit_parsers]]
message = "^feature"
group = "🚀 Features"

[[git.commit_parsers]]
message = "^fix"
group = "🐛 Bug Fixes"

[[git.commit_parsers]]
message = "^docs"
group = "📚 Documentation"

[[git.commit_parsers]]
message = "^refactor"
group = "♻️ Refactoring"

[[git.commit_parsers]]
message = "^chore"
group = "🔧 Misc"
