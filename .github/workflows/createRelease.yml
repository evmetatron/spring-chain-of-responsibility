name: Create release

on:
  workflow_dispatch:
    inputs:
      increaseVersion:
        type: choice
        description: 'Increase version'
        default: increasePatch
        required: true
        options:
          - increaseMajor
          - increaseMinor
          - increasePatch

permissions:
  actions: write
  contents: write

run-name: Create release by @${{ github.actor }}

jobs:
  createRelease:
    name: Create release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Set up git checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create new version number
        run: |
          git fetch --tags

          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="0.0.0"
          fi

          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if [ "${{ github.event.inputs.increaseVersion }}" == "increaseMajor" ]; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0
          elif [ "${{ github.event.inputs.increaseVersion }}" == "increaseMinor" ]; then
            MINOR=$((MINOR+1))
            PATCH=0
          elif [ "${{ github.event.inputs.increaseVersion }}" == "increasePatch" ]; then
            PATCH=$((PATCH+1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Bump version inside files
        run: |
          mvn versions:set -DnewVersion=$NEW_VERSION -DgenerateBackupPoms=false
          sed -i "/<!-- version:start -->/,/<!-- version:end -->/s/[0-9]\+\.[0-9]\+\.[0-9]\+\(-SNAPSHOT\)\?/$NEW_VERSION/g" README.md

      - name: Set up git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate changelog
        run: |
          git-cliff --config .github/workflows/cliff.toml --tag $NEW_VERSION --output CHANGELOG.md

      - name: Commit and create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git add pom.xml README.md CHANGELOG.md
          git commit -m "Release $NEW_VERSION"
          
          git tag $NEW_VERSION
          
          git push origin HEAD
          git push origin $NEW_VERSION

      - name: Set up java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
          cache: 'maven'

      - name: Create release
        run: |
          git-cliff --config .github/workflows/cliff.toml --latest > RELEASE_NOTES.md
          mvn -B --errors clean package -DskipTests
          gh release create $NEW_VERSION --title "$NEW_VERSION" --notes-file RELEASE_NOTES.md target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run deploy workflow
        run: gh workflow run deploy.yml --ref $NEW_VERSION
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
